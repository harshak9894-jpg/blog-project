services:
  - type: web
    name: blog-project
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: UPLOADS_DIR
        value: /var/data/uploads
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
